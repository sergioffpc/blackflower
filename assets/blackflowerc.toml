# Blackflower client configuration.
# Path passed via `--config` (defaults to ./assets/blackflowerc.toml).

# Window dimensions (pixels). Either field may be omitted to use its default
# (1280 x 720); the whole table may be omitted too.
[window]
width = 1280
height = 720

# Mouse-look tuning. `sensitivity` is radians of view rotation per pixel of
# mouse motion. The table may be omitted to use the default (0.0022).
[look]
sensitivity = 0.0022

# Input bindings: physical key -> action.
# The action must name an `InputButtons` flag (case-insensitive):
# forward, backward, left, right, fire.
# Bind several keys to the same action by repeating the action value.
[bindings]
W = "forward"
S = "backward"
A = "left"
D = "right"
Space = "fire"
