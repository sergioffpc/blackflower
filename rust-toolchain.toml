# rust-toolchain.toml
# Pins the Rust toolchain version used across the workspace.
# Every contributor (and CI) automatically uses these settings via rustup.

[toolchain]
# Stable channel. We deliberately avoid nightly/beta for production code.
# Pin a specific minor version for reproducibility.
channel = "1.95.0"

# Components installed alongside the compiler.
# - rustfmt: code formatting (used by CI)
# - clippy: linter (used by CI)
# - rust-src: source code of std, required by rust-analyzer and some tools
components = ["rustfmt", "clippy", "rust-src"]

# Cross-compilation targets we want available locally.
# Server runs on Linux (x86_64), client on the developer's machine.
# Adjust to match your actual deployment targets.
targets = ["x86_64-unknown-linux-gnu", "aarch64-unknown-linux-gnu"]

# Profile installed by rustup. "minimal" keeps disk usage low; we add only
# what we need via `components` above. Alternative: "default" (adds docs, etc).
profile = "minimal"
