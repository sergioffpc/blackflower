<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 540" role="img">
<title>Network protocol stack</title>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect width="680" height="540" fill="white"/>
<rect x="15" y="15" width="650" height="510" rx="14" fill="none" stroke="#888" stroke-width="0.5" stroke-dasharray="6 4" opacity="0.5"/>
<text x="35" y="38" font-family="sans-serif" font-size="11" fill="#555">Network stack (client ↔ server, mirrored)</text>
<text x="35" y="72" font-family="sans-serif" font-size="11" font-style="italic" fill="#555" opacity="0.85">Application — three channels</text>
<g><rect x="35" y="84" width="195" height="65" rx="8" fill="#fad8d2" stroke="#a85948" stroke-width="0.5"/><text x="132" y="107" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#5a2418">Hot state</text><text x="132" y="127" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#5a2418">Snapshots, commands</text></g>
<g><rect x="245" y="84" width="195" height="65" rx="8" fill="#fad8d2" stroke="#a85948" stroke-width="0.5"/><text x="342" y="107" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#5a2418">Events</text><text x="342" y="127" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#5a2418">Chat, map, kills</text></g>
<g><rect x="455" y="84" width="195" height="65" rx="8" fill="#fad8d2" stroke="#a85948" stroke-width="0.5"/><text x="552" y="107" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#5a2418">Bulk</text><text x="552" y="127" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#5a2418">Maps, assets</text></g>
<text x="35" y="178" font-family="sans-serif" font-size="11" font-style="italic" fill="#555" opacity="0.85">Protocol — sequence, ack, reliability</text>
<g><rect x="35" y="190" width="195" height="65" rx="8" fill="#e9d5f2" stroke="#8b5fa6" stroke-width="0.5"/><text x="132" y="213" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#3b1d4f">Snapshot pipeline</text><text x="132" y="233" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#3b1d4f">Delta + ack bitfield</text></g>
<g><rect x="245" y="190" width="195" height="65" rx="8" fill="#e9d5f2" stroke="#8b5fa6" stroke-width="0.5"/><text x="342" y="213" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#3b1d4f">Event channel</text><text x="342" y="233" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#3b1d4f">Reliable-unordered</text></g>
<g><rect x="455" y="190" width="195" height="65" rx="8" fill="#e9d5f2" stroke="#8b5fa6" stroke-width="0.5"/><text x="552" y="213" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#3b1d4f">Stream channel</text><text x="552" y="233" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#3b1d4f">Reliable-ordered</text></g>
<text x="35" y="284" font-family="sans-serif" font-size="11" font-style="italic" fill="#555" opacity="0.85">Transport — QUIC</text>
<g><rect x="35" y="296" width="405" height="65" rx="8" fill="#d4ebe5" stroke="#3a7a6a" stroke-width="0.5"/><text x="237" y="319" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#1d3b35">QUIC datagrams (unreliable)</text><text x="237" y="339" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#1d3b35">RFC 9221 — no head-of-line blocking</text></g>
<g><rect x="455" y="296" width="195" height="65" rx="8" fill="#d4ebe5" stroke="#3a7a6a" stroke-width="0.5"/><text x="552" y="319" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#1d3b35">QUIC streams</text><text x="552" y="339" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#1d3b35">Reliable multiplex</text></g>
<text x="35" y="390" font-family="sans-serif" font-size="11" font-style="italic" fill="#555" opacity="0.85">Encryption &amp; congestion</text>
<g><rect x="35" y="402" width="615" height="55" rx="8" fill="#e2e2e2" stroke="#777" stroke-width="0.5"/><text x="342" y="421" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#333">TLS 1.3 handshake + AEAD + congestion control</text><text x="342" y="441" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#333">Built into QUIC; 0-RTT on reconnects</text></g>
<text x="35" y="478" font-family="sans-serif" font-size="11" font-style="italic" fill="#555" opacity="0.85">Kernel</text>
<g><rect x="35" y="488" width="615" height="35" rx="8" fill="#e2e2e2" stroke="#777" stroke-width="0.5"/><text x="342" y="505" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#333">UDP / IPv4 + IPv6</text></g>
<line x1="132" y1="190" x2="132" y2="149" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="342" y1="190" x2="342" y2="149" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="552" y1="190" x2="552" y2="149" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="132" y1="296" x2="132" y2="255" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="342" y1="296" x2="342" y2="255" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="552" y1="296" x2="552" y2="255" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="237" y1="402" x2="237" y2="361" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="552" y1="402" x2="552" y2="361" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="342" y1="488" x2="342" y2="457" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
</svg>
