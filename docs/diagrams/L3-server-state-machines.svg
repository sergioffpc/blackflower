<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 590" role="img">
<title>Server state machines</title>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="err" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#c97064" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="cross" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect width="680" height="590" fill="white"/>
<rect x="15" y="15" width="650" height="280" rx="14" fill="none" stroke="#888" stroke-width="0.5" stroke-dasharray="6 4" opacity="0.5"/>
<text x="35" y="38" font-family="sans-serif" font-size="11" fill="#555">Server — global session state</text>
<g><rect x="35" y="60" width="120" height="55" rx="30" fill="#e2e2e2" stroke="#777" stroke-width="0.5"/><text x="95" y="80" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#333">Cold</text><text x="95" y="100" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#333">Empty lobby</text></g>
<g><rect x="180" y="60" width="140" height="55" rx="30" fill="#e9d5f2" stroke="#8b5fa6" stroke-width="0.5"/><text x="250" y="80" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#3b1d4f">Loading map</text><text x="250" y="100" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#3b1d4f">Loads assets</text></g>
<g><rect x="345" y="60" width="140" height="55" rx="30" fill="#d4ebe5" stroke="#3a7a6a" stroke-width="0.5"/><text x="415" y="80" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#1d3b35">In match</text><text x="415" y="100" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#1d3b35">60Hz tick</text></g>
<g><rect x="510" y="60" width="140" height="55" rx="30" fill="#e9d5f2" stroke="#8b5fa6" stroke-width="0.5"/><text x="580" y="80" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#3b1d4f">Map change</text><text x="580" y="100" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#3b1d4f">Next map</text></g>
<g><rect x="275" y="180" width="140" height="55" rx="30" fill="#fad8d2" stroke="#a85948" stroke-width="0.5"/><text x="345" y="200" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#5a2418">Shutting down</text><text x="345" y="220" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#5a2418">Drain + exit</text></g>
<line x1="155" y1="87" x2="180" y2="87" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<text x="167" y="80" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">start</text>
<line x1="320" y1="87" x2="345" y2="87" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<text x="333" y="80" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">ready</text>
<line x1="485" y1="87" x2="510" y2="87" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<text x="497" y="80" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">match end</text>
<path d="M 510 100 Q 380 145 250 115" fill="none" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<text x="380" y="155" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">cycle next</text>
<line x1="95" y1="115" x2="290" y2="180" stroke="#c97064" stroke-width="1" marker-end="url(#err)" opacity="0.7"/>
<line x1="580" y1="115" x2="400" y2="180" stroke="#c97064" stroke-width="1" marker-end="url(#err)" opacity="0.7"/>
<text x="450" y="170" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#c97064" opacity="0.7">SIGTERM</text>
<rect x="15" y="310" width="650" height="270" rx="14" fill="none" stroke="#888" stroke-width="0.5" stroke-dasharray="6 4" opacity="0.5"/>
<text x="35" y="333" font-family="sans-serif" font-size="11" fill="#555">Server — per-slot state (×64 in parallel)</text>
<g><rect x="35" y="355" width="105" height="50" rx="25" fill="#e2e2e2" stroke="#777" stroke-width="0.5"/><text x="87" y="382" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#333">Free</text></g>
<g><rect x="165" y="355" width="105" height="50" rx="25" fill="#e9d5f2" stroke="#8b5fa6" stroke-width="0.5"/><text x="217" y="382" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#3b1d4f">Reserved</text></g>
<g><rect x="295" y="355" width="115" height="50" rx="25" fill="#e9d5f2" stroke="#8b5fa6" stroke-width="0.5"/><text x="352" y="382" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#3b1d4f">Handshake</text></g>
<g><rect x="435" y="355" width="105" height="50" rx="25" fill="#e9d5f2" stroke="#8b5fa6" stroke-width="0.5"/><text x="487" y="382" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#3b1d4f">Auth</text></g>
<g><rect x="565" y="355" width="80" height="50" rx="25" fill="#fad8d2" stroke="#a85948" stroke-width="0.5"/><text x="605" y="382" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#5a2418">Loading</text></g>
<g><rect x="295" y="450" width="115" height="50" rx="25" fill="#d4ebe5" stroke="#3a7a6a" stroke-width="0.5"/><text x="352" y="477" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#1d3b35">Playing</text></g>
<g><rect x="465" y="450" width="105" height="50" rx="25" fill="#fad8d2" stroke="#a85948" stroke-width="0.5"/><text x="517" y="477" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#5a2418">Zombie</text></g>
<line x1="140" y1="380" x2="165" y2="380" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<text x="152" y="372" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">reserve</text>
<line x1="270" y1="380" x2="295" y2="380" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="410" y1="380" x2="435" y2="380" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="540" y1="380" x2="565" y2="380" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="605" y1="405" x2="380" y2="450" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<text x="490" y="430" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">map loaded</text>
<line x1="352" y1="500" x2="490" y2="500" stroke="#c97064" stroke-width="1" marker-end="url(#err)"/>
<text x="421" y="492" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#c97064">timeout</text>
<path d="M 517 450 Q 540 425 380 405" fill="none" stroke="#c97064" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#err)" opacity="0.7"/>
<text x="525" y="430" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#c97064" opacity="0.7">resume</text>
<path d="M 517 500 Q 350 555 87 405" fill="none" stroke="#c97064" stroke-width="1" marker-end="url(#err)"/>
<text x="270" y="555" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#c97064">drop / kick</text>
<line x1="250" y1="115" x2="605" y2="355" stroke="#888" stroke-width="1" stroke-dasharray="3 3" opacity="0.5" marker-end="url(#cross)"/>
<text x="600" y="335" text-anchor="end" font-family="sans-serif" font-size="11" fill="#555" opacity="0.6">global Loading triggers slot Loading</text>
</svg>
