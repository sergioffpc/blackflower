<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 540" role="img">
<title>Client connection state machine</title>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="err" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#c97064" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect width="680" height="540" fill="white"/>
<rect x="15" y="15" width="650" height="510" rx="14" fill="none" stroke="#888" stroke-width="0.5" stroke-dasharray="6 4" opacity="0.5"/>
<text x="35" y="38" font-family="sans-serif" font-size="11" fill="#555">Client — connection state machine</text>
<g><rect x="35" y="60" width="170" height="65" rx="35" fill="#e2e2e2" stroke="#777" stroke-width="0.5"/><text x="120" y="83" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#333">Disconnected</text><text x="120" y="103" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#333">Main menu</text></g>
<g><rect x="255" y="60" width="170" height="65" rx="35" fill="#e9d5f2" stroke="#8b5fa6" stroke-width="0.5"/><text x="340" y="83" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#3b1d4f">Resolving</text><text x="340" y="103" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#3b1d4f">DNS + matchmaker</text></g>
<g><rect x="475" y="60" width="170" height="65" rx="35" fill="#e9d5f2" stroke="#8b5fa6" stroke-width="0.5"/><text x="560" y="83" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#3b1d4f">Handshaking</text><text x="560" y="103" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#3b1d4f">QUIC + TLS 1.3</text></g>
<g><rect x="475" y="180" width="170" height="65" rx="35" fill="#e9d5f2" stroke="#8b5fa6" stroke-width="0.5"/><text x="560" y="203" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#3b1d4f">Authenticating</text><text x="560" y="223" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#3b1d4f">Token + protocol ver</text></g>
<g><rect x="475" y="300" width="170" height="65" rx="35" fill="#fad8d2" stroke="#a85948" stroke-width="0.5"/><text x="560" y="323" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#5a2418">Loading</text><text x="560" y="343" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#5a2418">Map + resources</text></g>
<g><rect x="255" y="300" width="170" height="65" rx="35" fill="#d4ebe5" stroke="#3a7a6a" stroke-width="0.5"/><text x="340" y="323" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#1d3b35">Active</text><text x="340" y="343" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#1d3b35">Playing — 60Hz</text></g>
<g><rect x="35" y="300" width="170" height="65" rx="35" fill="#fad8d2" stroke="#a85948" stroke-width="0.5"/><text x="120" y="323" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#5a2418">Reconnecting</text><text x="120" y="343" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#5a2418">Timeout — 0-RTT</text></g>
<line x1="205" y1="92" x2="255" y2="92" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<text x="230" y="83" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">connect</text>
<line x1="425" y1="92" x2="475" y2="92" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<text x="450" y="83" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">found</text>
<line x1="560" y1="125" x2="560" y2="180" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<text x="595" y="155" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">crypto ok</text>
<line x1="560" y1="245" x2="560" y2="300" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<text x="595" y="275" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">accepted</text>
<line x1="475" y1="332" x2="425" y2="332" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<text x="450" y="323" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">first snap</text>
<path d="M 255 348 Q 230 380 205 348" fill="none" stroke="#c97064" stroke-width="1" marker-end="url(#err)"/>
<text x="230" y="395" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#c97064">timeout</text>
<path d="M 35 332 Q 0 200 480 100" fill="none" stroke="#c97064" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#err)" opacity="0.7"/>
<text x="50" y="220" text-anchor="start" font-family="sans-serif" font-size="11" fill="#c97064" opacity="0.7">0-RTT resume</text>
<path d="M 290 365 Q 250 470 130 365" fill="none" stroke="#c97064" stroke-width="1" marker-end="url(#err)"/>
<text x="210" y="485" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#c97064">disconnect / kick</text>
<text x="35" y="510" font-family="sans-serif" font-size="11" fill="#555" opacity="0.85">Solid green: happy path  ·  Solid orange: error  ·  Dashed orange: recovery</text>
</svg>
