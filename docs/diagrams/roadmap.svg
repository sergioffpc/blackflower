<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 700" role="img">
<title>Implementation roadmap</title>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect width="680" height="700" fill="white"/>
<rect x="15" y="15" width="650" height="675" rx="14" fill="none" stroke="#888" stroke-width="0.5" stroke-dasharray="6 4" opacity="0.5"/>
<text x="35" y="38" font-family="sans-serif" font-size="11" fill="#555">Implementation roadmap — ~12-18 months solo, 6-9 with small team</text>
<g><rect x="35" y="65" width="615" height="55" rx="8" fill="#e2e2e2" stroke="#777" stroke-width="0.5"/><text x="65" y="86" text-anchor="start" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#333">M0 · Foundations</text><text x="65" y="106" text-anchor="start" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#333">workspace, CI, engine-core skeleton, log, math, ADR template — 1-2 weeks</text></g>
<g><rect x="35" y="140" width="615" height="65" rx="8" fill="#d4ebe5" stroke="#3a7a6a" stroke-width="0.5"/><text x="65" y="161" text-anchor="start" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#1d3b35">M1 · Vertical slice: two cubes communicating</text><text x="65" y="181" text-anchor="start" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#1d3b35">minimal ECS, tick scheduler, QUIC echo, raw snapshot (no delta), client window+render</text><text x="65" y="195" text-anchor="start" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#1d3b35" opacity="0.7">Demo: server has cube A, client sees cube A moving — 4-6 weeks</text></g>
<g><rect x="35" y="225" width="615" height="65" rx="8" fill="#d4ebe5" stroke="#3a7a6a" stroke-width="0.5"/><text x="65" y="246" text-anchor="start" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#1d3b35">M2 · Input and prediction</text><text x="65" y="266" text-anchor="start" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#1d3b35">input → command → wire, local sim with reconcile buffer, mispred &amp; rollback</text><text x="65" y="280" text-anchor="start" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#1d3b35" opacity="0.7">Demo: WASD moves cube, prediction visible even at 100ms lag — 3-4 weeks</text></g>
<g><rect x="35" y="310" width="615" height="65" rx="8" fill="#d4ebe5" stroke="#3a7a6a" stroke-width="0.5"/><text x="65" y="331" text-anchor="start" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#1d3b35">M3 · Multi-client and interpolation</text><text x="65" y="351" text-anchor="start" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#1d3b35">slot machine, handshake, snapshot delta with ack-bitfield, interp buffer for remotes</text><text x="65" y="365" text-anchor="start" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#1d3b35" opacity="0.7">Demo: 4 clients see each other, smooth movement — 4-6 weeks</text></g>
<g><rect x="35" y="395" width="615" height="65" rx="8" fill="#e9d5f2" stroke="#8b5fa6" stroke-width="0.5"/><text x="65" y="416" text-anchor="start" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#3b1d4f">M4 · World and physics</text><text x="65" y="436" text-anchor="start" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#3b1d4f">engine-physics, basic collision, minimal asset pipeline (simple map), hit detection</text><text x="65" y="450" text-anchor="start" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#3b1d4f" opacity="0.7">Demo: box arena, 8 players, hits with lag-comp via history rewind — 6-8 weeks</text></g>
<g><rect x="35" y="480" width="615" height="65" rx="8" fill="#e9d5f2" stroke="#8b5fa6" stroke-width="0.5"/><text x="65" y="501" text-anchor="start" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#3b1d4f">M5 · Content and tooling</text><text x="65" y="521" text-anchor="start" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#3b1d4f">functional cooker (textures, models, maps), hot-reload, basic audio, MVP editor</text><text x="65" y="535" text-anchor="start" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#3b1d4f" opacity="0.7">Demo: textured arena with audio, level designer edits .scene → sees in seconds — 8-10 weeks</text></g>
<g><rect x="35" y="565" width="615" height="55" rx="8" fill="#fad8d2" stroke="#a85948" stroke-width="0.5"/><text x="65" y="586" text-anchor="start" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#5a2418">M6 · Scale and production</text><text x="65" y="606" text-anchor="start" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#5a2418">64 players, telemetry, k8s deploy, anti-cheat hooks, sustained optimization — 8-12 weeks</text></g>
<g><rect x="35" y="640" width="615" height="40" rx="8" fill="#fad8d2" stroke="#a85948" stroke-width="0.5"/><text x="65" y="661" text-anchor="start" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#5a2418">M7 · Polish — advanced renderer, audio mixing, particles, UI tooling (∞)</text></g>
<line x1="340" y1="120" x2="340" y2="140" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="205" x2="340" y2="225" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="290" x2="340" y2="310" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="375" x2="340" y2="395" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="460" x2="340" y2="480" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="545" x2="340" y2="565" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="620" x2="340" y2="640" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
</svg>
