<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 510" role="img">
<title>Anatomy of a server tick</title>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect width="680" height="510" fill="white"/>
<text x="5" y="22" text-anchor="start" font-family="sans-serif" font-size="11" fill="#555">1 tick = 16.67ms @ 60Hz</text>
<g><rect x="35" y="35" width="90" height="40" rx="6" fill="#d4ebe5" stroke="#3a7a6a" stroke-width="0.5"/><text x="80" y="55" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="600" fill="#1d3b35">Tick</text></g>
<g><rect x="143" y="35" width="90" height="40" rx="6" fill="#e9d5f2" stroke="#8b5fa6" stroke-width="0.5"/><text x="188" y="55" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="600" fill="#3b1d4f">Network</text></g>
<g><rect x="251" y="35" width="90" height="40" rx="6" fill="#d4ebe5" stroke="#3a7a6a" stroke-width="0.5"/><text x="296" y="55" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="600" fill="#1d3b35">World ECS</text></g>
<g><rect x="359" y="35" width="90" height="40" rx="6" fill="#d4ebe5" stroke="#3a7a6a" stroke-width="0.5"/><text x="404" y="55" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="600" fill="#1d3b35">Simulation</text></g>
<g><rect x="467" y="35" width="90" height="40" rx="6" fill="#d4ebe5" stroke="#3a7a6a" stroke-width="0.5"/><text x="512" y="55" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="600" fill="#1d3b35">History</text></g>
<g><rect x="575" y="35" width="90" height="40" rx="6" fill="#e9d5f2" stroke="#8b5fa6" stroke-width="0.5"/><text x="620" y="55" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="600" fill="#3b1d4f">Snapshot</text></g>
<line x1="80" y1="80" x2="80" y2="485" stroke="#888" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.4"/>
<line x1="188" y1="80" x2="188" y2="485" stroke="#888" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.4"/>
<line x1="296" y1="80" x2="296" y2="485" stroke="#888" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.4"/>
<line x1="404" y1="80" x2="404" y2="485" stroke="#888" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.4"/>
<line x1="512" y1="80" x2="512" y2="485" stroke="#888" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.4"/>
<line x1="620" y1="80" x2="620" y2="485" stroke="#888" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.4"/>
<text x="5" y="112" text-anchor="start" font-family="sans-serif" font-size="11" fill="#555">drain</text>
<text x="5" y="162" text-anchor="start" font-family="sans-serif" font-size="11" fill="#555">apply</text>
<text x="5" y="207" text-anchor="start" font-family="sans-serif" font-size="11" fill="#555">simulate</text>
<text x="5" y="307" text-anchor="start" font-family="sans-serif" font-size="11" fill="#555">commit</text>
<text x="5" y="342" text-anchor="start" font-family="sans-serif" font-size="11" fill="#555">snapshot</text>
<text x="5" y="427" text-anchor="start" font-family="sans-serif" font-size="11" fill="#555">send</text>
<text x="5" y="465" text-anchor="start" font-family="sans-serif" font-size="11" fill="#555">sleep</text>
<line x1="80" y1="120" x2="188" y2="120" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<text x="134" y="112" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">poll sockets</text>
<line x1="188" y1="170" x2="296" y2="170" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<text x="242" y="162" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">apply inputs</text>
<line x1="80" y1="215" x2="404" y2="215" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<text x="242" y="207" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">run systems</text>
<line x1="404" y1="245" x2="296" y2="245" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<text x="350" y="237" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">iterate archetypes</text>
<line x1="404" y1="275" x2="512" y2="275" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<text x="458" y="267" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">rewind for hits</text>
<line x1="80" y1="315" x2="512" y2="315" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<text x="296" y="307" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">store state[N]</text>
<line x1="80" y1="350" x2="620" y2="350" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<text x="350" y="342" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">build deltas</text>
<line x1="620" y1="378" x2="296" y2="378" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<text x="458" y="370" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">read current state</text>
<line x1="620" y1="405" x2="512" y2="405" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<text x="566" y="397" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">read ack[client]</text>
<line x1="620" y1="435" x2="188" y2="435" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<text x="404" y="427" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">send packets</text>
<path d="M 80 465 Q 50 475 80 485" fill="none" stroke="#888" stroke-width="1" opacity="0.7" marker-end="url(#arrow)"/>
</svg>
