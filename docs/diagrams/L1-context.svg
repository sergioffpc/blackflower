<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" role="img">
<title>Level 1 context diagram of the game engine</title>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect width="680" height="420" fill="white"/>
<g>
  <rect x="40" y="80" width="160" height="60" rx="8" fill="#e9d5f2" stroke="#8b5fa6" stroke-width="0.5"/>
  <text x="120" y="104" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#3b1d4f">Player</text>
  <text x="120" y="124" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#3b1d4f">Plays the game</text>
</g>
<g>
  <rect x="40" y="190" width="160" height="60" rx="8" fill="#e9d5f2" stroke="#8b5fa6" stroke-width="0.5"/>
  <text x="120" y="214" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#3b1d4f">Developer</text>
  <text x="120" y="234" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#3b1d4f">Builds games</text>
</g>
<g>
  <rect x="40" y="300" width="160" height="60" rx="8" fill="#e9d5f2" stroke="#8b5fa6" stroke-width="0.5"/>
  <text x="120" y="324" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#3b1d4f">Operator</text>
  <text x="120" y="344" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#3b1d4f">Hosts sessions</text>
</g>
<g>
  <rect x="240" y="60" width="200" height="320" rx="14" fill="#d4ebe5" stroke="#3a7a6a" stroke-width="0.5"/>
  <text x="340" y="100" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#1d3b35">Game engine</text>
  <text x="340" y="120" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#1d3b35">Client + server platform</text>
</g>
<g>
  <rect x="480" y="80" width="160" height="60" rx="8" fill="#e2e2e2" stroke="#777" stroke-width="0.5"/>
  <text x="560" y="104" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#333">Platform</text>
  <text x="560" y="124" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#333">OS, GPU, peripherals</text>
</g>
<g>
  <rect x="480" y="190" width="160" height="60" rx="8" fill="#e2e2e2" stroke="#777" stroke-width="0.5"/>
  <text x="560" y="214" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#333">Network</text>
  <text x="560" y="234" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#333">Internet transport</text>
</g>
<g>
  <rect x="480" y="300" width="160" height="60" rx="8" fill="#e2e2e2" stroke="#777" stroke-width="0.5"/>
  <text x="560" y="324" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#333">Online services</text>
  <text x="560" y="344" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#333">Auth, telemetry, CDN</text>
</g>
<line x1="200" y1="110" x2="240" y2="110" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="200" y1="220" x2="240" y2="220" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="200" y1="330" x2="240" y2="330" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="440" y1="110" x2="480" y2="110" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="440" y1="220" x2="480" y2="220" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="440" y1="330" x2="480" y2="330" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
</svg>
