<g><rect x="35" y="145" width="160" height="50" rx="8" fill="#e2e2e2" stroke="#777" stroke-width="0.5"/><text x="115" y="163" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#333">Models</text><text x="115" y="181" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#333">.fbx .glb</text></g>
