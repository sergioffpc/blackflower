<g><rect x="475" y="255" width="170" height="65" rx="8" fill="#d4ebe5" stroke="#3a7a6a" stroke-width="0.5"/><text x="560" y="278" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#1d3b35">Shader cache</text><text x="560" y="298" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#1d3b35">Per platform/RHI</text></g>
<g><rect x="475" y="340" width="170" height="65" rx="8" fill="#d4ebe5" stroke="#3a7a6a" stroke-width="0.5"/><text x="560" y="363" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#1d3b35">Manifest</text><text x="560" y="383" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#1d3b35">Hash → asset id</text></g>
<g><rect x="170" y="490" width="340" height="80" rx="10" fill="#fad8d2" stroke="#a85948" stroke-width="0.5"/><text x="340" y="513" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#5a2418">Runtime (client or server)</text><text x="340" y="535" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#5a2418">Loads bundles in production</text><text x="340" y="555" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#5a2418">Hot-reload deltas in dev</text></g>
