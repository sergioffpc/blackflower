<text x="35" y="38" font-family="sans-serif" font-size="11" fill="#555">Asset pipeline (dev-time, separate process)</text>
<text x="35" y="72" font-family="sans-serif" font-size="11" font-style="italic" fill="#555" opacity="0.85">Sources (versioned in git/lfs)</text>
