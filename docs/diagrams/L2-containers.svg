  <text x="180" y="50" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#3b1d4f">Player</text>
  <text x="180" y="70" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#3b1d4f">Plays the game</text>
</g>
<g>
  <rect x="440" y="30" width="120" height="56" rx="8" fill="#e9d5f2" stroke="#8b5fa6" stroke-width="0.5"/>
  <text x="500" y="50" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#3b1d4f">Operator</text>
  <text x="500" y="70" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#3b1d4f">Hosts sessions</text>
</g>
<g>
  <rect x="75" y="170" width="215" height="80" rx="10" fill="#d4ebe5" stroke="#3a7a6a" stroke-width="0.5"/>
  <text x="182" y="198" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#1d3b35">Game client</text>
  <text x="182" y="222" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#1d3b35">Render, audio, prediction</text>
</g>
<g>
  <rect x="390" y="170" width="215" height="80" rx="10" fill="#d4ebe5" stroke="#3a7a6a" stroke-width="0.5"/>
  <text x="497" y="198" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#1d3b35">Dedicated server</text>
  <text x="497" y="222" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#1d3b35">Authoritative simulation</text>
</g>
<g>
  <rect x="240" y="330" width="200" height="80" rx="10" fill="#e2e2e2" stroke="#777" stroke-width="0.5"/>
  <text x="340" y="358" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#333">Asset bundle</text>
  <text x="340" y="382" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#333">Cooked content</text>
</g>
